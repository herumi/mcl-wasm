name: "CodeQL Config"

queries:
  - uses: security-and-quality
  - uses: security-extended

paths:
  - src/mcl/src/**/*.cpp
  - src/mcl/src/**/*.hpp
  - src/mcl/include/**/*.h
  - src/mcl/src/wasm/**/*.c
  - src/mcl/src/wasm/**/*.h

paths-ignore:
  - src/mcl/src/wasm/dlmalloc.c
  - src/mcl_c.js
  - "**/*.js"
  - "**/*.ts"
  - "**/*.wasm"

build-mode: manual