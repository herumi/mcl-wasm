name: test
on: [push]

permissions:
  contents: read

jobs:
  build:
    name: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
    - name: Install pnpm
      uses: pnpm/action-setup@v4
    - run: pnpm install
    - run: pnpm test
    - run: pnpm run test-ts

